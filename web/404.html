<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Not found · ShortLink</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(900px 500px at 50% -12%, #1c2a52 0%, rgba(28,42,82,0) 55%), #0b1020;
      color: #e7ecf7; text-align: center; padding: 24px;
    }
    .code { font-size: clamp(4rem, 18vw, 7rem); font-weight: 700; letter-spacing: -0.04em; line-height: 1;
      background: linear-gradient(180deg, #6ea8fe, #4f8ff7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    h1 { font-size: 1.3rem; margin: 18px 0 6px; }
    p { color: #93a0c0; margin: 0 0 26px; max-width: 32ch; }
    a.btn { display: inline-block; text-decoration: none; font-weight: 650;
      color: #06122e; background: linear-gradient(180deg, #6ea8fe, #4f8ff7);
      padding: 12px 22px; border-radius: 11px; }
    a.btn:hover { filter: brightness(1.07); }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>That link doesn’t exist</h1>
    <p>The short link is invalid or expired, or the page wasn’t found.</p>
    <a class="btn" href="/">← Shorten a URL</a>
  </main>
</body>
</html>
